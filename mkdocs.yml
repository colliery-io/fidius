site_name: fidius
site_description: A Rust plugin framework for trait-to-dylib plugin systems
site_url: https://colliery-io.github.io/fidius
repo_url: https://github.com/colliery-io/fidius
repo_name: colliery-io/fidius

copyright: Copyright &copy; 2026 Colliery, Inc. Licensed under Apache-2.0.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - toc:
      permalink: true
  - attr_list
  - def_list
  - tables

plugins:
  - search

nav:
  - Home: index.md
  - Tutorials:
    - Your First Plugin: tutorials/your-first-plugin.md
    - Optional Methods: tutorials/optional-methods.md
    - Signing Plugins: tutorials/signing-plugins.md
    - Source Packages: tutorials/source-packages.md
  - How-To Guides:
    - Scaffold a Project: how-to/scaffold-project.md
    - Test Plugins: how-to/test-plugins.md
    - Method Metadata: how-to/method-metadata.md
    - Async Methods: how-to/async-methods.md
    - Multiple Plugins per Dylib: how-to/multiple-plugins-per-dylib.md
    - Inspect a Plugin: how-to/inspect-plugin.md
    - Development Workflow: how-to/development-workflow.md
    - Package Metadata Schema: how-to/create-package-schema.md
    - White-Label Interface: how-to/white-label-interface.md
  - Reference:
    - CLI: reference/cli.md
    - ABI Specification: reference/abi-specification.md
    - Errors: reference/errors.md
    - Package Manifest: reference/package-manifest.md
  - API:
    - fidius (facade): api/rust/fidius.md
    - fidius-core: api/rust/fidius-core.md
    - fidius-macro: api/rust/fidius-macro.md
    - fidius-host: api/rust/fidius-host.md
    - fidius-cli: api/rust/fidius-cli.md
    - Submodules:
      - "core: descriptor": api/rust/fidius-core/descriptor.md
      - "core: error": api/rust/fidius-core/error.md
      - "core: hash": api/rust/fidius-core/hash.md
      - "core: wire": api/rust/fidius-core/wire.md
      - "core: status": api/rust/fidius-core/status.md
      - "core: registry": api/rust/fidius-core/registry.md
      - "core: async_runtime": api/rust/fidius-core/async_runtime.md
      - "core: package": api/rust/fidius-core/package.md
      - "macro: ir": api/rust/fidius-macro/ir.md
      - "macro: interface": api/rust/fidius-macro/interface.md
      - "macro: impl_macro": api/rust/fidius-macro/impl_macro.md
      - "host: host": api/rust/fidius-host/host.md
      - "host: handle": api/rust/fidius-host/handle.md
      - "host: loader": api/rust/fidius-host/loader.md
      - "host: signing": api/rust/fidius-host/signing.md
      - "host: types": api/rust/fidius-host/types.md
      - "host: error": api/rust/fidius-host/error.md
      - "host: arch": api/rust/fidius-host/arch.md
      - "host: package": api/rust/fidius-host/package.md
      - "cli: commands": api/rust/fidius-cli/commands.md
  - Explanation:
    - Architecture: explanation/architecture.md
    - Interface Evolution: explanation/interface-evolution.md
    - Buffer Strategies: explanation/buffer-strategies.md
    - Wire Format: explanation/wire-format.md
