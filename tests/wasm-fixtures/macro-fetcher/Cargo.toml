# Standalone — kept out of the parent fidius workspace. WASM-only author crate
# (FIDIUS-I-0028): a fidius connector written entirely with the macros, whose
# `fetch` makes a brokered outbound GET via `fidius_guest::http`. `#[plugin_impl]`
# auto-exports the WIT component; `fidius_guest::http` contributes the wasi:http
# import — the two generate! compose. Built for wasm32-wasip2; loaded via the
# macro-emitted `Fetcher_WASM_DESCRIPTOR`.
[workspace]

[package]
name = "macro-fetcher"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[features]
host = []

[dependencies]
fidius-guest = { path = "../../../crates/fidius-guest" }
fidius-macro = { path = "../../../crates/fidius-macro" }
wit-bindgen = "0.44"

[profile.release]
opt-level = "s"
lto = true
strip = true
