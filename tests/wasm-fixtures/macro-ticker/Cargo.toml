# Standalone — kept out of the parent fidius workspace. WASM-only author crate:
# a fidius *server-streaming* plugin (FIDIUS-I-0026) whose `#[plugin_impl]`
# auto-exports a WIT component with a streaming `resource`. Built for
# wasm32-wasip2; loaded by the host via the macro-emitted `Ticker_WASM_DESCRIPTOR`.
[workspace]

[package]
name = "macro-ticker"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[features]
host = []

[dependencies]
fidius-guest = { path = "../../../crates/fidius-guest" }
fidius-macro = { path = "../../../crates/fidius-macro" }
wit-bindgen = "0.44"

[profile.release]
opt-level = "s"
lto = true
strip = true
