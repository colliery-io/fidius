# Standalone — kept out of the parent fidius workspace.
# FIDIUS-I-0033 (E2): a WASM component that performs an OUTBOUND TCP connect via
# std::net::TcpStream (which is wasi:sockets on wasm32-wasip2). Built with
# `cargo build --release --target wasm32-wasip2` (the wasip2 target emits a
# component directly; the wasi:sockets imports come from std/wasi-libc). Exercises
# the capability-gated TCP egress + EgressPolicy::authorize_tcp hook.
[workspace]

[package]
name = "tcp-echo-guest"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
# wit-bindgen generates only the `tcp-echo` export from the vendored wit/; the
# wasi:sockets imports are added by the wasm32-wasip2 std/wasi-libc, not here.
wit-bindgen = "0.44"

[profile.release]
opt-level = "s"
lto = true
strip = true
