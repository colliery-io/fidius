name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        profile: [dev, release]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.profile }}
      - name: Run tests
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo test --workspace --release
          else
            cargo test --workspace
          fi

  wasm:
    name: WASM backend (component model)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.41.1"
      # Component toolchain (FIDIUS-I-0021). Versions pinned to those the
      # backend was developed against; bump deliberately.
      - name: Install component toolchain
        run: |
          cargo install --locked cargo-component@0.21.1
          cargo install --locked wasm-tools@1.252.0
          pipx install componentize-py==0.24.0
          # Go guest (FIDIUS-I-0025): TinyGo needs binaryen's wasm-opt; the
          # bindings come from wit-bindgen-go.
          sudo apt-get update && sudo apt-get install -y binaryen
          go install go.bytecodealliance.org/cmd/wit-bindgen-go@v0.7.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build polyglot fixtures
        run: |
          (cd tests/wasm-fixtures/greeter && cargo component build --release)
          tests/wasm-fixtures/greeter-py/build.sh
          # JavaScript guest (FIDIUS-I-0025): same WIT via jco/ComponentizeJS —
          # the third language proving the host is language-agnostic.
          tests/wasm-fixtures/greeter-js/build.sh
          # Go guest (FIDIUS-I-0025): same WIT via TinyGo + wit-bindgen-go —
          # a native-compiled component (~0.5 MB, no embedded interpreter).
          tests/wasm-fixtures/greeter-go/build.sh
          # Macro auto-export fixture (FIDIUS-T-0106/I-0022): a fidius-macro plugin
          # that builds straight to a component. Explicit build = fast, clear
          # failure if the macro's wasm codegen regresses.
          (cd tests/wasm-fixtures/macro-greeter && cargo build --target wasm32-wasip2 --release)
          # User-type fixture (FIDIUS-I-0023): record + variant via #[derive(WitType)],
          # with build.rs-generated wit/ + conversions.
          (cd tests/wasm-fixtures/records-greeter && cargo build --target wasm32-wasip2 --release)
      - name: Run wasm-backend tests
        run: cargo test -p fidius-host --features wasm
