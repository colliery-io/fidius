name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO }}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "fidius") | .version')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match crate version $VERSION"
            exit 1
          fi

      - name: Run tests
        run: cargo test --workspace --release

      # Publish in dependency order with index propagation delays.
      # --no-verify skips rebuild during publish (already tested above).
      # Order: core → macro → python → host → test → fidius (facade) → cli.
      # Each step tolerates "already exists" (idempotent re-tag) but fails
      # on any other error — no silent failures.
      - name: Publish fidius-core
        run: |
          out=$(cargo publish -p fidius-core --no-verify 2>&1) && echo "$out" && exit 0
          echo "$out"
          echo "$out" | grep -q "already exists"

      - name: Wait for index
        run: sleep 30

      - name: Publish fidius-macro
        run: |
          out=$(cargo publish -p fidius-macro --no-verify 2>&1) && echo "$out" && exit 0
          echo "$out"
          echo "$out" | grep -q "already exists"

      - name: Wait for index
        run: sleep 30

      - name: Publish fidius-python
        run: |
          out=$(cargo publish -p fidius-python --no-verify 2>&1) && echo "$out" && exit 0
          echo "$out"
          echo "$out" | grep -q "already exists"

      - name: Wait for index
        run: sleep 30

      - name: Publish fidius-host
        run: |
          out=$(cargo publish -p fidius-host --no-verify 2>&1) && echo "$out" && exit 0
          echo "$out"
          echo "$out" | grep -q "already exists"

      - name: Wait for index
        run: sleep 30

      - name: Publish fidius-test
        run: |
          out=$(cargo publish -p fidius-test --no-verify 2>&1) && echo "$out" && exit 0
          echo "$out"
          echo "$out" | grep -q "already exists"

      - name: Wait for index
        run: sleep 30

      - name: Publish fidius (facade)
        run: |
          out=$(cargo publish -p fidius --no-verify 2>&1) && echo "$out" && exit 0
          echo "$out"
          echo "$out" | grep -q "already exists"

      - name: Wait for index
        run: sleep 30

      - name: Publish fidius-cli
        run: |
          out=$(cargo publish -p fidius-cli --no-verify 2>&1) && echo "$out" && exit 0
          echo "$out"
          echo "$out" | grep -q "already exists"
